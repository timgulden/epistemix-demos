<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Epistemix · Wellbeing Strategy Advisor — Cardinal Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />
<style>
html, body { margin: 0; padding: 0; }
:root {
    /* ════════════════════════════════════════════════════════════════════
       PRISM design tokens — pasted from prism-design-system/tokens.css.
       Canonical source of truth; re-sync this block if tokens.css changes.
       (Single-file demo: an @import won't survive the publish copy.)
       ════════════════════════════════════════════════════════════════════ */
    /* Color · surface */
    --color-surface:         #ffffff;
    --color-surface-muted:   #f8f9fa;
    --color-page-background:  #f0f1f3;
    --color-border:          #e5e7eb;
    --color-border-strong:   #d1d5db;
    --color-border-focus:    #3b82f6;
    /* Color · text */
    --color-text-primary:    #1a1a1a;
    --color-text-secondary:  #6b7280;
    --color-text-muted:      #9ca3af;
    /* Color · semantic highlights */
    --color-brand:           #3b82f6;
    --color-highlight-blue:  #3b82f6;
    --color-highlight-green: #6FD93F;
    --color-highlight-yellow:#F5C542;
    --color-highlight-red:   #EF5350;
    --color-highlight-blue-fill:   rgba(59, 130, 246, 0.15);
    --color-highlight-green-fill:  rgba(111, 217, 63, 0.15);
    --color-highlight-yellow-fill: rgba(245, 197, 66, 0.15);
    --color-highlight-red-fill:    rgba(239, 83, 80, 0.15);
    /* Color · categorical palette (muted) + 12%-opacity light variants */
    --color-cat-0: #5B8FD4;  --color-cat-0-light: rgba(91, 143, 212, 0.12);
    --color-cat-1: #4DB6AC;  --color-cat-1-light: rgba(77, 182, 172, 0.12);
    --color-cat-2: #D4915B;  --color-cat-2-light: rgba(212, 145, 91, 0.12);
    --color-cat-3: #9575CD;  --color-cat-3-light: rgba(149, 117, 205, 0.12);
    --color-cat-4: #81C784;  --color-cat-4-light: rgba(129, 199, 132, 0.12);
    --color-cat-5: #E57373;  --color-cat-5-light: rgba(229, 115, 115, 0.12);
    /* Typography */
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                 'Helvetica Neue', Arial, sans-serif;
    --font-mono: 'JetBrains Mono', 'Liberation Mono', Menlo, Consolas, monospace;
    --font-size-xs:     11px;
    --font-size-sm:     12px;
    --font-size-base:   14px;
    --font-size-md:     15px;
    --font-size-lg:     18px;
    --font-size-xl:     22px;
    --font-size-metric: 36px;
    --font-weight-normal:   400;
    --font-weight-medium:   500;
    --font-weight-semibold: 600;
    --font-weight-bold:     700;
    --label-letter-spacing: 0.14em;
    /* Spacing */
    --space-1: 4px;  --space-2: 8px;  --space-3: 12px; --space-4: 16px;
    --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
    /* Radii (Prism scale) */
    --radius-sm:  3px;  --radius-lg: 10px;  --radius-xl: 12px;  --radius-pill: 999px;
    /* Shadows */
    --shadow-card:       0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --shadow-modal:      0 20px 60px rgba(0,0,0,0.15), 0 4px 16px rgba(0,0,0,0.08);
    --shadow-dropdown:   0 4px 16px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.06);
    /* Transitions */
    --transition-fast: 120ms ease;
    --transition-base: 200ms ease;
    --transition-slow: 300ms ease;

    /* ════════════════════════════════════════════════════════════════════
       DEMO BRIDGE — the demo's original variable names remapped onto Prism
       tokens (documented override per SA-DEMOS-SUBSET.md). Lets the existing
       ~250 references resolve to Prism values without a risky mass find/replace;
       gray-dominant aesthetic is enforced by targeted CSS below, not here.
       ════════════════════════════════════════════════════════════════════ */
    /* Neutral grays → Prism gray ramp */
    --slate-50:  var(--color-surface-muted);
    --slate-100: var(--color-surface-muted);
    --slate-200: var(--color-border);
    --slate-300: var(--color-border-strong);
    --slate-400: var(--color-text-muted);
    --slate-500: var(--color-text-secondary);
    --slate-600: var(--color-text-secondary);
    --slate-700: var(--color-text-primary);
    --slate-800: var(--color-text-primary);
    --slate-900: var(--color-text-primary);
    /* Blue ramp collapsed toward brand / neutral (kills blue dominance) */
    --epx-blue-50:  var(--color-surface-muted);
    --epx-blue-100: var(--color-surface-muted);
    --epx-blue-200: var(--color-border-strong);
    --epx-blue-300: var(--color-cat-0);
    --epx-blue-400: var(--color-cat-0);
    --epx-blue-500: var(--color-brand);
    --epx-blue-600: var(--color-brand);
    --epx-blue-700: var(--color-text-primary);
    --epx-blue-800: var(--color-text-primary);
    --epx-blue-900: var(--color-text-primary);
    /* Semantic */
    --epx-success: var(--color-highlight-green);
    --epx-warn:    var(--color-highlight-yellow);
    --epx-danger:  var(--color-highlight-red);
    /* Radius/shadow aliases (literals avoid a name-collision cascade with
       Prism's --radius-md/--radius-sm; values track the Prism scale) */
    --radius-md: 12px;  /* demo "card" radius → Prism --radius-xl */
    --radius-sm: 6px;   /* demo "control" radius → Prism --radius-md */
    --radius-xs: 3px;   /* demo "chip" radius → Prism --radius-sm */
    --shadow-lift: var(--shadow-card-hover);
  }

  *, *::before, *::after { box-sizing: border-box; }
  .wb-root { min-height: 100vh; background-color: var(--color-page-background); color: var(--color-text-primary);
    font-family: var(--font-sans);
    font-size: var(--font-size-base); line-height: 1.5;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "tnum" 1;
  }
  .wb-root h1, .wb-root h2, .wb-root h3, .wb-root h4 { margin: 0; }
  .wb-root button { font-family: inherit; }
  /* Data numbers use JetBrains Mono + tabular alignment (Prism: mono for data labels). */
  .wb-num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .wb-label { font-size: var(--font-size-xs); text-transform: uppercase;
    letter-spacing: var(--label-letter-spacing);
    font-weight: var(--font-weight-medium); color: var(--color-text-secondary); }

  /* header */
  .wb-chrome { border-bottom: 1px solid var(--slate-200); background: white;
    padding: 16px 32px 0; box-shadow: var(--shadow-card);
    position: sticky; top: 0; z-index: 100; }
  .wb-chrome-row { display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; }
  .wb-brand { display: flex; align-items: center; gap: 12px; }
  .wb-mark { display: flex; gap: 4px; }
  .wb-mark .sq { width: 12px; height: 12px; border-radius: 2px; transform: rotate(45deg); }
  .wb-mark .sq:nth-child(1) { background: var(--epx-blue-500); }
  .wb-mark .sq:nth-child(2) { background: var(--epx-blue-700); }
  .wb-mark .sq:nth-child(3) { background: var(--epx-blue-400); }
  .wb-brand h1 {
    color: var(--color-text-primary);
    font-size: 22px; font-weight: 800; letter-spacing: -0.02em; line-height: 1;
  }
  .wb-brand p { margin: 2px 0 0; font-size: 12px; color: var(--slate-500); }
  .wb-case-meta { display: flex; align-items: center; gap: 18px;
    font-size: 13px; color: var(--slate-600); }
  .wb-case-name { color: var(--slate-900); font-weight: 600; }
  .wb-sep { color: var(--slate-300); }

  /* tab bar */
  .wb-tab-bar { display: inline-flex; border: 1px solid var(--slate-200);
    background: var(--slate-50); border-radius: var(--radius-md);
    padding: 4px; gap: 2px; margin-bottom: -1px; }
  .wb-tab-bar button {
    background: transparent; border: 0; color: var(--slate-500);
    padding: 8px 20px; font-size: 14px; font-weight: 500;
    border-radius: var(--radius-sm); cursor: pointer;
    transition: background 200ms ease-out, color 200ms ease-out;
    letter-spacing: -0.005em;
  }
  .wb-tab-bar button:hover:not(.is-active) {
    background: rgba(255,255,255,0.7); color: var(--epx-blue-500); }
  .wb-tab-bar button.is-active {
    background: white; color: var(--epx-blue-500); font-weight: 600;
    box-shadow: var(--shadow-lift); }

  /* main */
  .wb-main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  /* panel */
  .wb-panel { background: white; border: 1px solid var(--slate-200);
    border-radius: var(--radius-md); padding: 24px;
    box-shadow: var(--shadow-card); }
  .wb-panel-head { display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 16px; padding-bottom: 14px;
    border-bottom: 1px solid var(--slate-100); }
  .wb-panel-title { font-size: 14px; font-weight: 600; color: var(--slate-800);
    letter-spacing: -0.005em; }
  .wb-panel-meta { font-size: 12px; color: var(--slate-500); }

  /* scenario picker */
  .wb-scenario-bar { display: flex; align-items: center; gap: 18px;
    margin-bottom: 22px; padding: 14px 18px;
    background: white; border: 1px solid var(--slate-200);
    border-radius: var(--radius-md); box-shadow: var(--shadow-card); }
  .wb-scenario-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
    font-weight: 500; color: var(--slate-500); }
  .wb-scenario-pills { display: inline-flex; gap: 4px; padding: 3px;
    background: var(--slate-100); border-radius: var(--radius-sm); }
  .wb-scenario-pills button {
    background: transparent; border: 0; padding: 6px 14px;
    font-size: 13px; font-weight: 500; color: var(--slate-600);
    border-radius: 4px; cursor: pointer;
    transition: all 180ms ease-out;
  }
  .wb-scenario-pills button:hover:not(.is-active) { color: var(--slate-900); }
  .wb-scenario-pills button.is-active {
    background: white; color: var(--epx-blue-600); font-weight: 600;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  /* lens toggle */
  .wb-lens-toggle { display: inline-flex; align-items: center; gap: 6px;
    padding: 3px; background: var(--slate-100);
    border-radius: var(--radius-sm); }
  .wb-lens-toggle button {
    background: transparent; border: 0; padding: 6px 14px;
    font-size: 12px; font-weight: 500; color: var(--slate-600);
    border-radius: 4px; cursor: pointer; letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .wb-lens-toggle button.is-active {
    background: var(--epx-blue-500); color: white; font-weight: 600;
  }

  /* hero card */
  .wb-hero { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px;
    margin-bottom: 20px; }
  .wb-hero-card { background: var(--color-surface);
    color: var(--color-text-primary); border: 1px solid var(--color-border);
    border-radius: var(--radius-xl); padding: 24px 28px;
    box-shadow: var(--shadow-card); }
  .wb-hero-card .wb-label { color: var(--color-text-secondary); }
  .wb-hero-figure { font-family: var(--font-mono); font-size: 48px; font-weight: 600; line-height: 1;
    margin: 10px 0 6px; letter-spacing: -0.025em; color: var(--color-text-primary);
    font-variant-numeric: tabular-nums; }
  .wb-hero-sub { font-size: 14px; color: var(--color-text-secondary); }
  .wb-hero-breakdown { display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 16px; margin-top: 22px; padding-top: 18px;
    border-top: 1px solid var(--color-border); }
  .wb-hero-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
    font-weight: 500; color: var(--color-text-secondary); margin-bottom: 4px; }
  .wb-hero-stat-value { font-family: var(--font-mono); font-size: 22px; font-weight: 600; line-height: 1.1;
    font-variant-numeric: tabular-nums; letter-spacing: -0.01em; color: var(--color-text-primary); }
  .wb-hero-stat-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  /* Talent lens: four equal-weight outcome stats, no oversized single figure */
  .wb-hero-breakdown.is-4up { grid-template-columns: repeat(4, 1fr);
    margin-top: 20px; border-top: none; padding-top: 0; }
  .wb-hero-breakdown.is-4up .wb-hero-stat-value { font-size: 28px; }

  .wb-kpi-stack { display: flex; flex-direction: column; gap: 12px; }
  .wb-kpi { background: white; border: 1px solid var(--slate-200);
    border-radius: var(--radius-md); padding: 16px 20px;
    box-shadow: var(--shadow-card); display: flex; flex-direction: column;
    justify-content: center; }
  .wb-kpi .wb-label { margin-bottom: 6px; }
  .wb-kpi-value { font-size: 24px; font-weight: 500; line-height: 1.1;
    font-variant-numeric: tabular-nums; letter-spacing: -0.015em;
    color: var(--slate-900); }
  .wb-kpi-delta { font-size: 12px; margin-top: 4px; color: var(--slate-500); }
  .wb-kpi-delta.is-pos { color: var(--epx-success); }
  .wb-kpi-delta.is-neg { color: var(--epx-danger); }

  /* chart panel */
  .wb-chart-panel { background: white; border: 1px solid var(--slate-200);
    border-radius: var(--radius-md); padding: 20px 22px;
    box-shadow: var(--shadow-card); margin-bottom: 20px; }
  .wb-chart-head { display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; }
  .wb-chart-title { font-size: 14px; font-weight: 600; color: var(--slate-800);
    letter-spacing: -0.005em; }
  .wb-chart-toggle { display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--slate-600); cursor: pointer;
    user-select: none; }
  .wb-chart-toggle input { cursor: pointer; }

  .wb-secondary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  /* US map */
  .wb-us-map-wrap { width: 100%; height: 310px; position: relative; }
  .wb-us-map-wrap svg { width: 100%; height: 100%; display: block; }
  .wb-map-state {
    fill: var(--color-surface-muted);
    stroke: var(--color-border-strong);
    stroke-width: 0.3;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  .wb-map-state-hi {
    fill: var(--color-cat-0-light);
    stroke: var(--color-border-strong);
    stroke-width: 0.35;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  /* Workforce segments are a category, not a ranking → muted categorical palette */
  .wb-map-dot-frontline { fill: var(--color-cat-0); opacity: 0.9; }
  .wb-map-dot-distribution { fill: var(--color-cat-1); opacity: 0.9; }
  .wb-map-dot-corporate { fill: var(--color-cat-2); opacity: 0.9; }

  .wb-map-legend { display: flex; gap: 16px; margin-top: 12px;
    font-size: 12px; color: var(--slate-600); }
  .wb-map-legend-item { display: flex; align-items: center; gap: 6px; }
  .wb-map-legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* workforce panels */
  .wb-wf-framing { background: var(--color-surface-muted);
    border: 1px solid var(--color-border); border-radius: var(--radius-xl);
    padding: 20px 24px; margin-bottom: 20px;
    box-shadow: var(--shadow-card); }
  .wb-wf-framing-title { font-size: 14px; font-weight: 600; color: var(--color-text-primary);
    letter-spacing: -0.005em; margin-bottom: 6px; }
  .wb-wf-framing-body { font-size: 13.5px; color: var(--color-text-secondary); line-height: 1.6; }
  .wb-wf-framing-body strong { color: var(--color-text-primary); font-weight: 600; }

  .wb-wf-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 20px;
    margin-bottom: 20px; }

  /* demographic pyramid */
  .wb-pyramid { width: 100%; height: 280px; }
  .wb-pyramid-bar { fill: var(--color-cat-0); }
  .wb-pyramid-bar.is-female { fill: var(--color-cat-1); }
  .wb-pyramid-axis-text { font-size: 10px; fill: var(--color-text-secondary); font-family: var(--font-mono); }

  /* composition / sankey-ish */
  .wb-composition { display: flex; flex-direction: column; gap: 12px;
    margin-top: 8px; }
  /* enrollment-by-state table */
  .wb-state-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .wb-state-table th { text-align: left; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--slate-500); font-weight: 600;
    padding: 0 10px 8px; border-bottom: 1px solid var(--slate-200); }
  .wb-state-table td { padding: 9px 10px; border-bottom: 1px solid var(--slate-100);
    color: var(--slate-700); }
  .wb-state-table tfoot td { font-weight: 700; color: var(--slate-900);
    border-bottom: none; border-top: 2px solid var(--slate-200); }
  .wb-state-bar { position: relative; height: 14px; }
  .wb-state-bar-pop { position: absolute; left: 0; top: 0; height: 14px;
    background: var(--color-border-strong); border-radius: var(--radius-sm); }
  .wb-state-bar-emp { position: absolute; left: 0; top: 3px; height: 8px;
    background: var(--color-brand); border-radius: var(--radius-sm); }

  /* "What we'd ask you" closing screen — styled as the first page of an
     engagement deliverable (discovery questions), per the consulting-firm
     talk track: "here's what else we'd want to know to make it more precise." */
  .wb-ask-page { max-width: 860px; margin: 0 auto; background: var(--color-surface);
    border: 1px solid var(--color-border); border-radius: var(--radius-xl);
    box-shadow: var(--shadow-card); padding: 40px 48px 36px; }
  .wb-ask-doc-label { font-size: var(--font-size-xs); font-weight: var(--font-weight-medium);
    letter-spacing: var(--label-letter-spacing); text-transform: uppercase;
    color: var(--color-text-secondary); display: flex; justify-content: space-between; }
  .wb-ask-title { font-size: var(--font-size-xl); font-weight: var(--font-weight-bold);
    color: var(--color-text-primary); margin: 10px 0 4px; letter-spacing: -0.01em; }
  .wb-ask-sub { font-size: var(--font-size-base); color: var(--color-text-secondary);
    margin-bottom: 26px; max-width: 640px; line-height: 1.5; }
  .wb-ask-item { display: grid; grid-template-columns: 44px 1fr; gap: 14px;
    padding: 16px 0; border-top: 1px solid var(--color-border); }
  .wb-ask-num { font-family: var(--font-mono); font-size: 20px;
    color: var(--color-text-muted); font-variant-numeric: tabular-nums; padding-top: 1px; }
  .wb-ask-q { font-size: var(--font-size-md); font-weight: var(--font-weight-semibold);
    color: var(--color-text-primary); line-height: 1.45; }
  .wb-ask-sharpens { font-size: var(--font-size-sm); color: var(--color-text-secondary);
    margin-top: 5px; line-height: 1.55; }
  .wb-ask-sharpens strong { color: var(--color-text-primary); font-weight: var(--font-weight-semibold); }
  .wb-ask-foot { margin-top: 22px; padding-top: 14px; border-top: 1px solid var(--color-border);
    font-size: var(--font-size-sm); color: var(--color-text-muted); display: flex;
    justify-content: space-between; }

  /* Epistemic provenance chips (Methods / Workforce panel headers) —
     three-way source labels: literature / case data / model logic. */
  .wb-prov-chip { display: inline-block; font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px;
    border-radius: var(--radius-pill); margin-left: 8px; vertical-align: middle; }
  .wb-prov-chip.is-lit   { background: var(--color-cat-0-light); color: var(--color-cat-0); }
  .wb-prov-chip.is-data  { background: var(--color-cat-2-light); color: var(--color-cat-2); }
  .wb-prov-chip.is-logic { background: var(--color-surface-muted); color: var(--color-text-secondary); }

  /* person card — click-to-inspect overlay on the workforce map */
  .wb-person-card { position: absolute; top: 8px; right: 8px; width: 250px;
    background: var(--color-surface); border: 1px solid var(--color-border);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-dropdown);
    padding: 12px 14px; z-index: 5; }
  .wb-person-card-head { display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 8px; }
  .wb-person-card-close { border: none; background: none; font-size: 16px;
    color: var(--color-text-muted); cursor: pointer; padding: 0 2px;
    line-height: 1; }
  .wb-person-card-close:hover { color: var(--color-text-primary); }
  .wb-person-card-row { display: flex; justify-content: space-between;
    gap: 10px; padding: 4px 0; border-top: 1px solid var(--color-border);
    font-size: 12px; }
  .wb-person-card-k { color: var(--color-text-secondary); white-space: nowrap; }
  .wb-person-card-v { color: var(--color-text-primary); font-weight: 500;
    text-align: right; font-variant-numeric: tabular-nums; }
  .wb-person-card-foot { margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--color-border); font-size: 10.5px;
    color: var(--color-text-muted); line-height: 1.45; }
  .wb-person-card.is-expanded { width: 280px; max-height: 92%;
    overflow-y: auto; }
  .wb-person-detail-btn { display: block; width: 100%; margin-top: 8px;
    padding: 5px 8px; border: 1px solid var(--color-border);
    border-radius: var(--radius-md); background: var(--color-surface-muted);
    color: var(--color-brand); font-size: 11px; font-weight: 600;
    cursor: pointer; text-align: center; }
  .wb-person-detail-btn:hover { border-color: var(--color-brand); }

const DEPENDENT_SPEND_MULT = 1.4;
// Modest score bonus from broader coverage (more lives reached, deeper outcomes)
const DEPENDENT_SCORE_MULT = 1.12;

// Spend per percent of slider, by lever ($/EE per percentage point)
const SPEND_RATE = {
  physicals: 0.7, screenings: 0.6, biometric: 0.4, tobacco: 0.3, dpp: 2.4,
  mental_health: 1.4, financial: 0.5, eap: 0.5,
  navigation: 2.2, apc: 4.0, manager_capability: 1.0,
};

function computeSpend(values, deps) {
  return Object.entries(values).reduce(
    (sum, [id, v]) => {
      const rate = SPEND_RATE[id] || 0;
      const mult = (deps && deps[id]) ? DEPENDENT_SPEND_MULT : 1;
      return sum + v * rate * mult;
    }, 0
  );
}

// 6-point trajectories: Y0 (today), Y1, Y2, Y3, Y4, Y5

// MH symptom prevalence (%)
const MH = {

// Voluntary turnover (%)
const TURNOVER = {

// Chronic disease incidence (% / year, new cases)
const CHRONIC = {

  recommended: [1.20, 1.18, 1.05, 0.88, 0.74, 0.67],
  aggressive:  [1.20, 1.17, 1.00, 0.80, 0.66, 0.59],
};

// Pharmacy share of spend (%)
const PHARM_SHARE = {
  baseline:    [24.0, 25.4, 26.6, 27.5, 28.2, 28.7],
  recommended: [24.0, 25.3, 26.0, 26.4, 26.6, 26.7],
  aggressive:  [24.0, 25.2, 25.7, 26.0, 26.1, 26.1],
};

// Helper: 5-year NPV per scenario (rough — net savings minus spend, 5% discount rate
// chosen to approximate a corporate-bond-yield benchmark for benefits NPV work)
const NPV = { baseline: 0, recommended: 40.0, aggressive: 45.0 }; // $M, 5-yr net (savings − spend), ~5% discount
const PAYBACK_MO = { baseline: null, recommended: 31, aggressive: 36 };

/* helpers */

function buildBandData(centralArr, bandPct) {
  return centralArr.map((v, i) => ({
    year: YEARS[i],
    central: v,
    low: v * (1 - bandPct),
    high: v * (1 + bandPct),
    // recharts area between two values requires [low, high] tuple
    range: [v * (1 - bandPct), v * (1 + bandPct)],
  }));
}

/* Build a "delta vs baseline" series: scenarioArr[i] - baselineArr[i].
   For costs (lower is better) we negate so that "savings" reads positive. */
function buildDeltaData(scenarioArr, baselineArr, opts = {}) {
  const { savingsPositive = true, bandPct = 0 } = opts;
  const n = Math.min(scenarioArr.length, baselineArr.length);
  const out = [];
  for (let i = 0; i < n; i++) {
    const rawDelta = scenarioArr[i] - baselineArr[i];
    const delta = savingsPositive ? -rawDelta : rawDelta;
    const bandHalf = Math.abs(delta) * bandPct;
    out.push({
      year: YEARS[i],
      delta,
      low: delta - bandHalf,
      high: delta + bandHalf,
      range: [delta - bandHalf, delta + bandHalf],
    });
  }
  return out;
}

/* For each plan year Y1..Y4, compute:
     savings  = (baseline medPEPY - scenario medPEPY) * employees   (positive when scenario beats baseline)
     spend    = totalPEPY * employees                                (negative on the chart - it's an expense)
     net      = savings - spend
   Returns data shaped for a stacked bar/area chart. */
function buildNetSavingsData(scenarioMedPEPY, baselineMedPEPY, totalPEPY) {
  const employees = CASE.employees;
  const annualSpend = totalPEPY * employees;
  const out = [];
  for (let i = 1; i <= 4; i++) {
    const savings = (baselineMedPEPY[i] - scenarioMedPEPY[i]) * employees;
    out.push({
      year: 'Y' + i,
      savings: savings / 1e6,        // $M
      spend: -annualSpend / 1e6,     // $M, negative
      net: (savings - annualSpend) / 1e6,
    });
  }
  return out;
}

function buildSubgroupData(anchorY0, anchorY5) {
  // simple S-curve interpolation Y0 → Y5
  const fr = anchorY0.frontline;
  const di = anchorY0.distribution;
  const co = anchorY0.corporate;
  const frEnd = anchorY5.frontline;
  const diEnd = anchorY5.distribution;
  const coEnd = anchorY5.corporate;
  const progress = [0, 0.08, 0.32, 0.62, 0.85, 1.0];
  return progress.map((p, i) => ({
    year: YEARS[i],
    frontline: fr + (frEnd - fr) * p,
    distribution: di + (diEnd - di) * p,
    corporate: co + (coEnd - co) * p,
  }));
}

/* ─── Live response model ───────────────────────────────────────────
   Maps current lever values to outcomes by interpolating between the
   three preset anchor points (Baseline, Recommended, Aggressive).
   A weighted portfolio score determines the interpolation position;
   levers with higher modeled impact carry more weight in the score. */

const LEVER_WEIGHTS = {
  physicals: 1.5,
  screenings: 2.0,
  biometric: 1.0,
  tobacco: 1.5,
  dpp: 3.0,
  mental_health: 2.5,
  financial: 1.0,
  eap: 1.5,
  navigation: 2.5,
  apc: 2.0,
  manager_capability: 2.0,
};

function computeScore(values, deps) {
  return Object.entries(values).reduce(
    (s, [id, v]) => {
      const w = LEVER_WEIGHTS[id] || 0;
      const mult = (deps && deps[id]) ? DEPENDENT_SCORE_MULT : 1;
      return s + (v || 0) * w * mult;
    }, 0
  );
}

const SCENARIO_SCORES = {
  baseline: computeScore(SCENARIOS.baseline.values),
  recommended: computeScore(SCENARIOS.recommended.values),
  aggressive: computeScore(SCENARIOS.aggressive.values),
};

function interp1D(score, baseV, recV, aggV) {
  const sB = SCENARIO_SCORES.baseline;
  const sR = SCENARIO_SCORES.recommended;
  const sA = SCENARIO_SCORES.aggressive;
  if (score <= sB) return baseV;
  if (score <= sR) return baseV + (recV - baseV) * ((score - sB) / (sR - sB));
  if (score <= sA) return recV + (aggV - recV) * ((score - sR) / (sA - sR));
  return aggV;
}

function interpArr(score, baseArr, recArr, aggArr) {
  return baseArr.map((bv, i) => interp1D(score, bv, recArr[i], aggArr[i]));
}

function interpObj(score, baseObj, recObj, aggObj) {
  const out = {};
  for (const k of Object.keys(baseObj)) {
    out[k] = interp1D(score, baseObj[k], recObj[k], aggObj[k]);
  }
  return out;
}

function computeMetrics(values, deps) {
  // Interpolation position is computed WITHOUT deps so the anchor scenarios land
  // exactly on their anchors (SCENARIO_SCORES is deps-free too). This makes the
  // Baseline scenario read exactly $0 savings vs no-action. Dependents still
  // drive cost via computeSpend's own multiplier — they just don't secretly
  // shift the outcome curve, which previously lifted Baseline above its anchor.
  const score = computeScore(values);
  // Payback anchor for a just-above-baseline portfolio. Kept in the same
  // 2-4 year band as the Recommended/Max-Activation anchors so the displayed
  // figure stays consistent with the rest of the financials (a weak portfolio
  // pays back slowly, but not on an implausible ~8-year horizon).
  const baselinePayback = 42;
  return {
    score,
    npv: interp1D(score, NPV.baseline, NPV.recommended, NPV.aggressive),
    paybackMo: score <= SCENARIO_SCORES.baseline
      ? null
      : Math.round(interp1D(score, baselinePayback,
          PAYBACK_MO.recommended, PAYBACK_MO.aggressive)),
    medPEPY: interpArr(score, MED_PEPY.baseline, MED_PEPY.recommended, MED_PEPY.aggressive),
    absent: interpArr(score, ABSENT.baseline, ABSENT.recommended, ABSENT.aggressive),
    mh: interpArr(score, MH.baseline, MH.recommended, MH.aggressive),
    turnover: interpArr(score, TURNOVER.baseline, TURNOVER.recommended, TURNOVER.aggressive),
    chronic: interpArr(score, CHRONIC.baseline, CHRONIC.recommended, CHRONIC.aggressive),
    pharmShare: interpArr(score, PHARM_SHARE.baseline, PHARM_SHARE.recommended, PHARM_SHARE.aggressive),
    bandPct: interp1D(score,
      MED_PEPY_BAND_PCT.baseline,
      MED_PEPY_BAND_PCT.recommended,
      MED_PEPY_BAND_PCT.aggressive),
    medSubY5: interpObj(score, MED_PEPY_SUBGROUP_Y5.baseline,
      MED_PEPY_SUBGROUP_Y5.recommended, MED_PEPY_SUBGROUP_Y5.aggressive),
    absentSubY5: interpObj(score, ABSENT_SUBGROUP_Y5.baseline,
      ABSENT_SUBGROUP_Y5.recommended, ABSENT_SUBGROUP_Y5.aggressive),
    leversActive: Object.values(values).filter(v => v >= 25).length,
  };
}

function findActiveScenario(values) {
  for (const [id, s] of Object.entries(SCENARIOS)) {
    if (Object.keys(s.values).every(k => s.values[k] === values[k])) return id;
  }
  return null;
}

function fmtMoney(n) {
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(0);
}
function fmtMoneyFull(n) {
  return '$' + Math.round(n).toLocaleString('en-US');
}
function fmtPct(n, d = 1) { return n.toFixed(d) + '%'; }
function fmtDays(n) { return n.toFixed(1) + ' days'; }
function fmtMonths(n) { return n + ' mo'; }

function ChartTooltip({ active, payload, label, formatter, unit }) {
  if (!active || !payload || !payload.length) return null;
  // Filter out array-valued entries (these come from range Areas — the
  // central line + baseline tell the story; the band is just shading).
  const visible = payload.filter(p =>
    p && p.value != null && !Array.isArray(p.value) && typeof p.value === 'number'
  );
  if (!visible.length) return null;
  return (
    <div className="wb-tip">
      <div className="wb-tip-name">{label}</div>
      {visible.map((p, i) => (
        <div key={i} className="wb-tip-row">
          <span style={{ color: p.color }}>● {p.name}</span>
          <span className="v">{formatter ? formatter(p.value) : p.value}{unit || ''}</span>
        </div>
      ))}
    </div>
  );
}

/* Defensive number formatter — returns '' for non-numeric input so that
   Recharts internal calls (axis label measurement, etc.) cannot crash. */
function safeFormat(formatter) {
  return v => (typeof v === 'number' && isFinite(v)) ? formatter(v) : '';
}

/* ════════════════════════════════════════════════════════════════════
   HERO + PORTFOLIO STRIP — sit above the two-column Strategy explorer
   ════════════════════════════════════════════════════════════════════ */

function HeroCard({ lens, metrics, leverValues, deps }) {
  const isC = lens === 'cfo';
  const activeScenario = findActiveScenario(leverValues);
  const configLabel = activeScenario ? SCENARIOS[activeScenario].label : 'Custom';

  // 4-year cumulative savings, $M — sum over Y1..Y4 of (baseline - scenario) * employees
  const cumSavings4yr = useMemo(() => {
    let s = 0;
    for (let i = 1; i <= 4; i++) {
      s += (MED_PEPY.baseline[i] - metrics.medPEPY[i]) * CASE.employees;
    }
    return s / 1e6;
  }, [metrics.medPEPY]);

  // 4-year cumulative wellbeing spend, $M
  const cumSpend4yr = useMemo(() =>
    (computeSpend(leverValues, deps) * CASE.employees * 4) / 1e6,
    [leverValues, deps]);

  const heroLabel = isC ? '4-Year Medical Savings vs No Action'
    : 'Year 4 Workforce Outcomes · vs. no action';
  const heroValue = isC
    ? '$' + cumSavings4yr.toFixed(1) + 'M'
    : null;
  const heroSub = isC
    ? `gross, on $${cumSpend4yr.toFixed(1)}M wellbeing spend${cumSpend4yr > 0 ? ` · ≈ $${(cumSavings4yr / cumSpend4yr).toFixed(2)} saved per $1` : ''}`
    : null;

  const heroStats = isC ? [
    { label: 'Y4 Medical+Rx PEPY', value: fmtMoneyFull(metrics.medPEPY[4]),
      sub: `vs ${fmtMoneyFull(MED_PEPY.baseline[4])} no-action trend` },
    { label: 'Payback', value: metrics.paybackMo ? fmtMonths(metrics.paybackMo) : 'n/a',
      sub: 'months to breakeven' },
    { label: '5-Year NPV',
      value: '$' + metrics.npv.toFixed(1) + 'M',
      sub: 'at 5% discount' },
  ] : [
    { label: 'Absenteeism', value: fmtDays(metrics.absent[4]),
      sub: `vs ${fmtDays(ABSENT.baseline[4])} no action` },
    { label: 'Turnover', value: fmtPct(metrics.turnover[4]),
      sub: `vs ${fmtPct(TURNOVER.baseline[4])} no action` },
    { label: 'Mental-health symptoms', value: fmtPct(metrics.mh[4]),
      sub: `vs ${fmtPct(MH.baseline[4])} no action` },
    { label: 'Chronic-disease burden', value: fmtPct(metrics.chronic[4], 2),
      sub: `vs ${fmtPct(CHRONIC.baseline[4], 2)} no action` },
  ];

  return (
    <div className="wb-hero-card wb-hero-solo">
      <span className="wb-label">{heroLabel}</span>
      {heroValue && <div className="wb-hero-figure wb-num">{heroValue}</div>}
      {heroSub && <div className="wb-hero-sub">{heroSub}</div>}
      <div className={`wb-hero-breakdown${isC ? '' : ' is-4up'}`}>
        {heroStats.map((s, i) => (
          <div key={i}>
            <div className="wb-hero-stat-label">{s.label}</div>
            <div className="wb-hero-stat-value wb-num">{s.value}</div>
            <div className="wb-hero-stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function PortfolioStrip({ metrics, leverValues, deps }) {
  const totalPEPY = computeSpend(leverValues, deps);
  const annualSpend = totalPEPY * CASE.employees;
  const activeScenario = findActiveScenario(leverValues);
  const configLabel = activeScenario ? SCENARIOS[activeScenario].label : 'Custom';
  const leversActive = metrics.leversActive;

  return (
    <div className="wb-portfolio-strip">
      <div className="wb-portfolio-strip-cell">
        <span className="wb-label">Annual Wellbeing Spend</span>
        <div className="wb-portfolio-strip-value">{fmtMoney(annualSpend)}</div>
        <div className="wb-portfolio-strip-sub">
          ${totalPEPY.toFixed(0)} PEPY · across {CASE.employees.toLocaleString()} EE
        </div>
      </div>
      <div className="wb-portfolio-strip-cell">
        <span className="wb-label">Configuration</span>
        <div className="wb-portfolio-strip-value">{configLabel}</div>
        <div className="wb-portfolio-strip-sub">
          {leversActive} of {LEVERS.length} levers active{' '}
          {configLabel === 'Custom' ? '· adjust sliders to refine' : ''}
        </div>
      </div>
      <div className="wb-portfolio-strip-cell">
        <span className="wb-label">Outcome stability</span>
        <div className="wb-portfolio-strip-value">
          ±{Math.round(metrics.bandPct * 100)}%
        </div>
        <div className="wb-portfolio-strip-sub">
          80% credible interval on Y5 outcomes
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════
   OUTCOMES TAB
   ════════════════════════════════════════════════════════════════════ */

function OutcomesTab({ lens, metrics, leverValues, deps, subgroupDecomp, setSubgroupDecomp }) {
  const isC = lens === 'cfo';
  const bandPct = metrics.bandPct;

  // Primary trendline-vs-baseline data (Y0..Y4)
  const primaryDeltaData = useMemo(() => {
    if (isC) {
      // Cost delta: baseline - scenario, positive = savings
      return buildDeltaData(
        metrics.medPEPY.slice(0, 5),
        MED_PEPY.baseline.slice(0, 5),
        { savingsPositive: true, bandPct }
      );
    } else {
      // Absenteeism delta: baseline - scenario, positive = days reduced
      return buildDeltaData(
        metrics.absent.slice(0, 5),
        ABSENT.baseline.slice(0, 5),
        { savingsPositive: true, bandPct }
      );
    }
  }, [isC, metrics, bandPct]);

  // Subgroup decomposition for primary chart
  const subgroupData = useMemo(() => {
    const anchorY0 = isC ? MED_PEPY_SUBGROUP_Y0 : ABSENT_SUBGROUP_Y0;
    const anchorY5 = isC ? metrics.medSubY5 : metrics.absentSubY5;
    return buildSubgroupData(anchorY0, anchorY5).slice(0, 5);
  }, [isC, metrics]);

  const primaryTitle = isC
    ? 'Medical + Rx PEPY savings vs no action · 4-year trendline'
    : 'Absenteeism days reduced vs no action · 4-year trendline';
  const primaryFormatter = safeFormat(
    isC ? v => '$' + Math.round(v).toLocaleString()
        : v => v.toFixed(1) + ' days'
  );

  // For subgroup chart, we show the LEVEL not the delta (more intuitive on subgroup)
  const subgroupTitle = isC
    ? 'Medical + Rx PEPY · 5-year trajectory by job type'
    : 'Absenteeism days per employee · 5-year trajectory by job type';
  const subgroupFormatter = safeFormat(
    isC ? fmtMoneyFull : v => v.toFixed(1) + ' days'
  );

  // Gap commentary on subgroup view
  const gapCommentary = useMemo(() => {
    if (!subgroupDecomp) return null;
    if (isC) {
      const blGap = MED_PEPY_SUBGROUP_Y5.baseline.frontline - MED_PEPY_SUBGROUP_Y5.baseline.corporate;
      const scGap = metrics.medSubY5.frontline - metrics.medSubY5.corporate;
      return `Frontline–corporate cost gap at Y5: ${fmtMoneyFull(blGap)} under no action · ${fmtMoneyFull(scGap)} under this portfolio. The portfolio reduces absolute spend most where the no-action cost is highest.`;
    } else {
      const blGap = ABSENT_SUBGROUP_Y5.baseline.frontline - ABSENT_SUBGROUP_Y5.baseline.corporate;
      const scGap = metrics.absentSubY5.frontline - metrics.absentSubY5.corporate;
      return `Frontline–corporate absenteeism gap at Y5: ${blGap.toFixed(1)} days under no action · ${scGap.toFixed(1)} days under this portfolio. The gap visibly narrows — equity benefit of the portfolio.`;
    }
  }, [subgroupDecomp, isC, metrics]);

  // Net savings by year chart data (Financial lens only)
  const netSavingsData = useMemo(() =>
    buildNetSavingsData(metrics.medPEPY, MED_PEPY.baseline, computeSpend(leverValues, deps)),
    [metrics.medPEPY, leverValues, deps]);

  return (
    <div className="wb-tab-active">
      {/* Primary chart with subgroup toggle */}
      <div className="wb-chart-panel">
        <div className="wb-chart-head">
          <div className="wb-chart-title">{subgroupDecomp ? subgroupTitle : primaryTitle}</div>
          <label className="wb-chart-toggle">
            <input type="checkbox" checked={subgroupDecomp}
              onChange={e => setSubgroupDecomp(e.target.checked)} />
            Explore by job type
          </label>
        </div>
        <ResponsiveContainer width="100%" height={280}>
          {subgroupDecomp ? (
            <LineChart data={subgroupData} margin={{ top: 8, right: 24, left: 8, bottom: 8 }}>
              <CartesianGrid stroke="var(--color-border)" vertical={false} />
              <XAxis dataKey="year" tick={{ fontSize: 11, fill: 'var(--color-text-secondary)' }} stroke="var(--color-border)" />
              <YAxis tick={{ fontSize: 11, fill: 'var(--color-text-secondary)' }} stroke="var(--color-border)"
                tickFormatter={subgroupFormatter} width={isC ? 70 : 50} />
              <Tooltip content={<ChartTooltip formatter={subgroupFormatter} />} />
              <Legend wrapperStyle={{ fontSize: 12 }} />
              <Line type="monotone" dataKey="frontline" name="Frontline"
                stroke="var(--color-cat-0)" strokeWidth={2.2} dot={{ r: 3 }} />
              <Line type="monotone" dataKey="distribution" name="Distribution"
                stroke="var(--color-cat-1)" strokeWidth={2.2} dot={{ r: 3 }} />
              <Line type="monotone" dataKey="corporate" name="Corporate"
                stroke="var(--color-cat-2)" strokeWidth={2.2} dot={{ r: 3 }} />
            </LineChart>
          ) : (
            <ComposedChart data={primaryDeltaData} margin={{ top: 8, right: 24, left: 8, bottom: 8 }}>
              <CartesianGrid stroke="var(--color-border)" vertical={false} />
              <XAxis dataKey="year" tick={{ fontSize: 11, fill: 'var(--color-text-secondary)' }} stroke="var(--color-border)" />
              <YAxis tick={{ fontSize: 11, fill: 'var(--color-text-secondary)' }} stroke="var(--color-border)"
                tickFormatter={primaryFormatter} width={isC ? 70 : 50} />
              <Tooltip content={<ChartTooltip formatter={primaryFormatter} />} />
              <ReferenceLine y={0} stroke="var(--color-border-strong)" strokeWidth={1} />
              <Area type="monotone" dataKey="range" name="80% credible interval"
                stroke="none" fill="var(--color-border)" fillOpacity={1} />
              <Line type="monotone" dataKey="delta" name={isC ? 'Savings vs no action' : 'Days reduced vs no action'}
                stroke="var(--color-brand)" strokeWidth={2.4} dot={{ r: 3 }} />
            </ComposedChart>
          )}
        </ResponsiveContainer>
        {gapCommentary && (
          <div style={{ marginTop: 12, padding: '10px 14px',
            background: 'var(--epx-blue-50)', borderRadius: 6,
            fontSize: 12.5, color: 'var(--epx-blue-700)',
            borderLeft: '3px solid var(--epx-blue-500)' }}>
            {gapCommentary}
          </div>
        )}
      </div>

      {/* Secondary charts — depend on lens */}
      <div className="wb-secondary-grid">
        {isC ? (
          <NetSavingsChart data={netSavingsData} />
        ) : (
          <>
            <DeltaChart
              title="Turnover reduction vs no action · 4-year trendline"
              scenarioArr={metrics.turnover.slice(0, 5)}
              baselineArr={TURNOVER.baseline.slice(0, 5)}
              formatter={safeFormat(v => v.toFixed(2) + ' pp')}
              bandPct={bandPct * 0.8}
              colorPos="var(--color-brand)"
              seriesName="Turnover reduction"
            />
            <DeltaChart
              title="Mental-health symptom prevalence vs no action · 4-year trendline"
              scenarioArr={metrics.mh.slice(0, 5)}
              baselineArr={MH.baseline.slice(0, 5)}
              formatter={safeFormat(v => v.toFixed(2) + ' pp')}
              bandPct={bandPct * 0.7}
              colorPos="var(--color-brand)"
              seriesName="Symptom prevalence reduction"
            />
            <DeltaChart
              title="Chronic-disease burden vs no action · 4-year trendline"
              scenarioArr={metrics.chronic.slice(0, 5)}
              baselineArr={CHRONIC.baseline.slice(0, 5)}
              formatter={safeFormat(v => v.toFixed(2) + ' pp')}
              bandPct={bandPct * 0.7}
              colorPos="var(--color-brand)"
              seriesName="Burden reduction"
            />
          </>
        )}
      </div>
    </div>
  );
}

/* Delta-vs-baseline trendline chart (4-year) used for secondary panels */
function DeltaChart({ title, scenarioArr, baselineArr, formatter, bandPct, colorPos, seriesName }) {
  const data = buildDeltaData(scenarioArr, baselineArr, { savingsPositive: true, bandPct });
  return (
    <div className="wb-chart-panel" style={{ marginBottom: 0 }}>
      <div className="wb-chart-head">
        <div className="wb-chart-title">{title}</div>
      </div>
      <ResponsiveContainer width="100%" height={180}>
        <ComposedChart data={data} margin={{ top: 8, right: 16, left: 8, bottom: 8 }}>
          <CartesianGrid stroke="var(--color-border)" vertical={false} />
          <XAxis dataKey="year" tick={{ fontSize: 10, fill: 'var(--color-text-secondary)' }} stroke="var(--color-border)" />
          <YAxis tick={{ fontSize: 10, fill: 'var(--color-text-secondary)' }} stroke="var(--color-border)"
            tickFormatter={formatter} width={50} />
          <Tooltip content={<ChartTooltip formatter={formatter} />} />
          <ReferenceLine y={0} stroke="var(--color-border-strong)" strokeWidth={1} />
          <Area type="monotone" dataKey="range" stroke="none"
            fill="var(--color-border)" fillOpacity={1} name="80% range" />
          <Line type="monotone" dataKey="delta" stroke={colorPos}
            strokeWidth={2} dot={{ r: 2.5 }} name={seriesName} />
        </ComposedChart>
      </ResponsiveContainer>
    </div>
  );
}

/* Net Savings by year: bars for savings + spend, line for net */
function NetSavingsChart({ data }) {
  return (
    <div className="wb-chart-panel" style={{ marginBottom: 0 }}>
      <div className="wb-chart-head">
        <div className="wb-chart-title">Annual savings vs wellbeing spend ($M)</div>
      </div>
      <ResponsiveContainer width="100%" height={220}>
        <BarChart data={data} margin={{ top: 8, right: 16, left: 8, bottom: 8 }} stackOffset="sign">
          <CartesianGrid stroke="var(--color-border)" vertical={false} />
          <XAxis dataKey="year" tick={{ fontSize: 11, fill: 'var(--color-text-secondary)' }} stroke="var(--color-border)" />
          <YAxis tick={{ fontSize: 11, fill: 'var(--color-text-secondary)' }} stroke="var(--color-border)"
            tickFormatter={safeFormat(v => '$' + v.toFixed(1) + 'M')} width={56} />
          <Tooltip content={<ChartTooltip formatter={safeFormat(v => '$' + v.toFixed(2) + 'M')} />} />
          <ReferenceLine y={0} stroke="var(--color-border-strong)" strokeWidth={1} />
          <Legend wrapperStyle={{ fontSize: 11 }} />
          <Bar dataKey="savings" stackId="a" fill="var(--color-brand)" name="Medical savings" />
          <Bar dataKey="spend" stackId="a" fill="var(--color-border-strong)" name="Wellbeing spend" opacity={0.9} />
          <Line type="monotone" dataKey="net" stroke="var(--color-text-primary)" strokeWidth={2.4}
            dot={{ r: 3 }} name="Net" />
        </BarChart>
      </ResponsiveContainer>
    </div>
  );
}

// @BAKE(footprint_states) END

function projectLL(lat, lng) {
  return {
    x: 60 + (lng + 125) / 58 * 600,
    y: 40 + (49 - lat) / 24 * 250,
  };
}


// Pre-project the baked people onto the map grid once.
const WORKFORCE_DOTS = WORKFORCE_PEOPLE.map((p, i) => ({
  ...p, id: i, ...projectLL(p.lat, p.lon),
}));

/* Person card — Mercer-style click-to-inspect, with a Howden-style modeled
   health expansion. Demographics/household are real (coarsened) synth-pop
   attributes; the health profile is MODELED (BRFSS/NHANES donor matching via
   the disease-enrichment tool) and labeled as such. */
function PersonCard({ person, onClose }) {
  const [expanded, setExpanded] = useState(false);
  useEffect(() => { setExpanded(false); }, [person]);
  if (!person) return null;
  const segLabel = { frontline: 'Frontline retail', distribution: 'Distribution',
                     corporate: 'Corporate / HQ' }[person.segment] || person.segment;
  const rows = [
    ['Age', `${person.age_band} · ${person.sex === 'F' ? 'female' : 'male'}`],
    ['Segment', segLabel],
    ['Home county', `${person.county}, ${person.state}`],
    ['Household', `${person.hh_size} ${person.hh_size === 1 ? 'person' : 'people'}`
      + (person.hh_member_ages.length
          ? ` — others: ${person.hh_member_ages.join(', ')}` : '')],
    ['Household income', person.income_band || 'n/a'],
  ];
  const h = person.health;
  return (
    <div className={`wb-person-card${expanded ? ' is-expanded' : ''}`}>
      <div className="wb-person-card-head">
        <span className="wb-label">Synthetic resident · US_2025</span>
        <button className="wb-person-card-close" onClick={onClose}
          aria-label="Close">×</button>
      </div>
      {rows.map(([k, v]) => (
        <div key={k} className="wb-person-card-row">
          <span className="wb-person-card-k">{k}</span>
          <span className="wb-person-card-v">{v}</span>
        </div>
      ))}
      {h && !expanded && (
        <button className="wb-person-detail-btn" onClick={() => setExpanded(true)}>
          Health &amp; program detail →
        </button>
      )}
      {h && expanded && (
        <>
          <div className="wb-person-section-label">Health profile · modeled</div>
          <div className="wb-person-chips">
            {h.conditions.map(c => (
              <span key={c} className="wb-person-chip">{c}</span>
            ))}
            {h.undiagnosed && (
              <span className="wb-person-chip is-flag"
                title="A1c in the diabetic range with no diagnosis — the kind of risk biometric screening surfaces">
                undiagnosed — screening would surface
              </span>
            )}
          </div>
          {h.relevance.length > 0 && (
            <>
              <div className="wb-person-section-label">Programs that reach this person</div>
              <div className="wb-person-chips">
                {h.relevance.map(rl => (
                  <span key={rl} className="wb-person-chip is-lever">{rl}</span>
                ))}
              </div>
            </>
          )}
          <div className="wb-person-section-label">Engagement</div>
          <div className="wb-person-chips">
            <span className="wb-person-chip">{h.engagement} adopter</span>
            <span className="wb-person-chip">

/* Pan/zoom map (Prism map-card treatment): wheel-zoom about the cursor,
   drag-pan, +/−/⌂ overlay controls. Pure SVG viewBox manipulation — no
   tiles, self-contained (can't-fail-live). Zoom range 1×–12×. */
const MAP_HOME = { x: 360, y: 80, w: 340, h: 210 };
const MAP_BOUNDS = { x: 0, y: 0, w: 720, h: 320 };   // full-US projected grid

function clampView(v) {
  const w = Math.min(Math.max(v.w, MAP_HOME.w / 12), MAP_HOME.w);
  const h = w * (MAP_HOME.h / MAP_HOME.w);
  return {
    w, h,
    x: Math.min(Math.max(v.x, MAP_BOUNDS.x), MAP_BOUNDS.x + MAP_BOUNDS.w - w),
    y: Math.min(Math.max(v.y, MAP_BOUNDS.y), MAP_BOUNDS.y + MAP_BOUNDS.h - h),
  };
}

function USMap() {
  const [selId, setSelId] = useState(null);
  const [view, setView] = useState(MAP_HOME);
  const svgRef = useRef(null);
  const dragRef = useRef(null);   // { px, py, view, moved }
  const sel = selId != null ? WORKFORCE_DOTS[selId] : null;
  const zoom = MAP_HOME.w / view.w;

  // Map coords of a pointer event.
  const toMap = useCallback((e, v) => {
    const rect = svgRef.current.getBoundingClientRect();
    return {
      mx: v.x + (e.clientX - rect.left) / rect.width * v.w,
      my: v.y + (e.clientY - rect.top) / rect.height * v.h,
    };
  }, []);

  const zoomAt = useCallback((factor, anchor) => {
    setView(v => {
      const w = v.w / factor;
      const a = anchor || { mx: v.x + v.w / 2, my: v.y + v.h / 2 };
      const fx = (a.mx - v.x) / v.w, fy = (a.my - v.y) / v.h;
      const h = w * (MAP_HOME.h / MAP_HOME.w);
      return clampView({ x: a.mx - fx * w, y: a.my - fy * h, w, h });
    });
  }, []);

  // Wheel zoom needs a NON-passive listener (React's onWheel can't
  // preventDefault page scroll), so attach natively.
  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    const onWheel = e => {
      e.preventDefault();
      setView(v => {
        const factor = e.deltaY < 0 ? 1.25 : 0.8;
        const w = v.w / factor;
        const rect = el.getBoundingClientRect();
        const mx = v.x + (e.clientX - rect.left) / rect.width * v.w;
        const my = v.y + (e.clientY - rect.top) / rect.height * v.h;
        const fx = (mx - v.x) / v.w, fy = (my - v.y) / v.h;
        const h = w * (MAP_HOME.h / MAP_HOME.w);
        return clampView({ x: mx - fx * w, y: my - fy * h, w, h });
      });
    };
    el.addEventListener('wheel', onWheel, { passive: false });
    return () => el.removeEventListener('wheel', onWheel);
  }, []);

  const onPointerDown = e => {
    if (e.button !== 0) return;
    // Do NOT capture here: capturing at pointerdown retargets the derived
    // click event to the svg, so the dot circles' onClick never fires.
    // Capture only once the drag threshold is crossed (in onPointerMove).
    dragRef.current = { px: e.clientX, py: e.clientY, view, moved: false };
  };
  const onPointerMove = e => {
    const d = dragRef.current;
    if (!d) return;
    const rect = svgRef.current.getBoundingClientRect();
    const dx = (e.clientX - d.px) / rect.width * d.view.w;
    const dy = (e.clientY - d.py) / rect.height * d.view.h;
    if (!d.moved && Math.abs(e.clientX - d.px) + Math.abs(e.clientY - d.py) > 3) {
      d.moved = true;
      svgRef.current.setPointerCapture(e.pointerId);  // pan continues off-svg
    }
    if (d.moved) setView(clampView({ ...d.view, x: d.view.x - dx, y: d.view.y - dy }));
  };
  const onPointerUp = () => { setTimeout(() => { dragRef.current = null; }, 0); };
  const wasDrag = () => dragRef.current && dragRef.current.moved;

  // Dots keep a useful on-screen size across zoom (grow ~√zoom on screen).
  const rScale = 1 / Math.sqrt(zoom);
  const hitR = 2.6 / Math.pow(zoom, 0.75);

  return (
    <div className="wb-us-map-wrap" style={{ position: 'relative' }}>
      <svg ref={svgRef}
        viewBox={`${view.x} ${view.y} ${view.w} ${view.h}`}
        preserveAspectRatio="xMidYMid meet"
        style={{ touchAction: 'none', cursor: 'grab' }}
        onPointerDown={onPointerDown} onPointerMove={onPointerMove}
        onPointerUp={onPointerUp} onPointerLeave={onPointerUp}>
        <defs>
          <clipPath id="wb-us-land">
            {US_STATES_PATHS.map(s => (
              <path key={s.n} d={s.d} />
            ))}
          </clipPath>
        </defs>
        {US_STATES_PATHS.map(s => (
          <path key={s.n} d={s.d}
            style={{ strokeWidth: Math.min(1, 0.8 / zoom) }}
            className={SE_FOOTPRINT_STATES.has(s.n)
              ? 'wb-map-state-hi'
              : 'wb-map-state'} />
        ))}
        <g clipPath="url(#wb-us-land)">
          {WORKFORCE_DOTS.map(d => {
            const r = (d.segment === 'corporate' ? 0.95
                    : d.segment === 'distribution' ? 0.9
                    : 0.75) * rScale * (zoom > 1 ? 1.6 : 1);
            return (
              <circle key={d.id} cx={d.x} cy={d.y} r={r}
                className={`wb-map-dot-${d.segment}`} />
            );
          })}
        </g>
        {/* invisible, larger hit targets so small dots stay clickable */}
        {WORKFORCE_DOTS.map(d => (
          <circle key={`hit-${d.id}`} cx={d.x} cy={d.y} r={hitR}
            fill="transparent" style={{ cursor: 'pointer' }}
            onClick={() => { if (!wasDrag()) setSelId(d.id === selId ? null : d.id); }} />
        ))}
        {sel && (
          <circle cx={sel.x} cy={sel.y} r={hitR * 0.85} fill="none"
            stroke="var(--color-text-primary)" strokeWidth={0.5 * rScale} />
        )}
      </svg>
      <div className="wb-map-controls">
        <button onClick={() => zoomAt(1.5)} aria-label="Zoom in">+</button>
        <button onClick={() => zoomAt(1 / 1.5)} aria-label="Zoom out">−</button>
        <button onClick={() => { setView(MAP_HOME); }} aria-label="Reset view"
          style={{ fontSize: 11 }}>⌂</button>
      </div>
      {zoom === 1 && <div className="wb-map-hint">scroll to zoom · drag to pan · click a dot</div>}
      <PersonCard person={sel} onClose={() => setSelId(null)} />
    </div>
  );
}

        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
          <span className="wb-evidence-chip is-moderate">moderate</span> mixed or observational
        </span>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5 }}>
          <span className="wb-evidence-chip is-emerging">emerging</span> early / limited signal
        </span>
      </div>
      <div className="wb-levers-section-title">
        Core Wellbeing Programs and Incentives
      </div>
      {coreLevers.map(l => (
        <LeverRow key={l.id} lever={l} value={values[l.id]}
          onChange={updateLever}
          depsValue={deps[l.id]} onDepsChange={updateDeps}
          openId={openId} setOpenId={setOpenId} />
      ))}

      <div className="wb-levers-section-title">
        Advanced wellbeing — access &amp; engagement
      </div>
      {advancedLevers.map(l => (
        <LeverRow key={l.id} lever={l} value={values[l.id]}
          onChange={updateLever}
          depsValue={deps[l.id]} onDepsChange={updateDeps}
          openId={openId} setOpenId={setOpenId} />
      ))}
    </div>
  );
}

// Interaction matrix data

// Sparse interaction table (only non-trivial pairs are populated).
// All cells use percentage notation with sign: +X% means amplifies, −X% means
// substitutes (avoids double-counting).
const INTERACTIONS = {
  'navigation:screenings':   { t: 'mult', l: '+40%' },
  'navigation:physicals':    { t: 'mult', l: '+35%' },
  'navigation:dpp':          { t: 'mult', l: '+30%' },
  'navigation:eap':          { t: 'mult', l: '+30%' },
  'navigation:biometric':    { t: 'mult', l: '+20%' },
  'apc:dpp':                 { t: 'sub',  l: '−30%' },
  'apc:screenings':          { t: 'mult', l: '+15%' },
  'financial:mental_health': { t: 'med',  l: '+20%' },
  'mental_health:eap':       { t: 'mult', l: '+10%' },
  'manager_capability:mental_health': { t: 'mult', l: '+25%' },
  'manager_capability:dpp':  { t: 'mult', l: '+15%' },
  'manager_capability:eap':  { t: 'mult', l: '+15%' },
};

/* Provenance chip — three-way epistemic source label. Every Methods panel
   (and Workforce data panel) declares where its content comes from:
   literature (published evidence), case data (this illustrative case),
   or model logic (structural assumptions we authored). */
function ProvChip({ kind }) {
  const label = { lit: 'literature', data: 'case data', logic: 'model logic' }[kind];
  return <span className={`wb-prov-chip is-${kind}`}>{label}</span>;
}

function MethodsTab() {
  return (
    <div className="wb-tab-active">
      <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap',
        gap: '6px 18px', margin: '0 0 16px', fontSize: 11.5,
        color: 'var(--color-text-secondary)' }}>
        <span style={{ textTransform: 'uppercase', letterSpacing: '0.12em',
          fontWeight: 600, color: 'var(--color-text-secondary)', fontSize: 10.5 }}>
          Provenance — where each panel's content comes from
        </span>
        <span><ProvChip kind="lit" /> published evidence, cited below</span>
        <span><ProvChip kind="data" /> this case's workforce — real synthetic-population records (US_2025), anonymized footprint; not client data</span>
        <span><ProvChip kind="logic" /> structural assumptions we authored</span>
      </div>
      <div className="wb-methods-grid">
        <div className="wb-panel">
          <div className="wb-panel-head">
            <div className="wb-panel-title">Lever-interaction matrix<ProvChip kind="logic" /></div>
            <div className="wb-panel-meta">non-trivial interactions only · prevents double-counting</div>
          </div>
          <div style={{ marginBottom: 14, fontSize: 12.5, color: 'var(--slate-600)',
            lineHeight: 1.55 }}>
            <strong style={{ color: 'var(--slate-800)' }}>How to read this:</strong>{' '}
            Each row asks: "when the row lever is active, how does it modify the column lever's effect?"
            Cells show a signed percentage. <span style={{ color: 'var(--epx-blue-700)', fontWeight: 600 }}>+%</span> means the row amplifies the column's effect;
            <span style={{ color: 'var(--epx-danger)', fontWeight: 600 }}> −%</span> means the row substitutes for some of the column's activity, preventing double-counting in the model.
            Blank cells mean no modeled interaction.
          </div>
          <table className="wb-matrix-table">
            <thead>
              <tr>
                <th className="row-head" style={{ minWidth: 60 }}>amplifies&nbsp;↓ /&nbsp;target&nbsp;→</th>
                {MATRIX_LEVER_ORDER.map(id => (
                  <th key={id}>{MATRIX_SHORT[id]}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {MATRIX_LEVER_ORDER.map(rowId => (
                <tr key={rowId}>
                  <td className="row-head">{MATRIX_SHORT[rowId]}</td>
                  {MATRIX_LEVER_ORDER.map(colId => {
                    if (rowId === colId)
                      return <td key={colId} className="wb-matrix-cell is-self">—</td>;
                    const key = `${rowId}:${colId}`;
                    const inter = INTERACTIONS[key];
                    if (!inter) return <td key={colId}></td>;
                    return <td key={colId} className={`wb-matrix-cell is-${inter.t}`}>
                      {inter.l}
                    </td>;
                  })}
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{ display: 'flex', gap: 14, marginTop: 14, fontSize: 11,
            color: 'var(--slate-600)', flexWrap: 'wrap' }}>
            <div><span className="wb-matrix-cell is-mult" style={{ padding: '2px 6px', borderRadius: 3 }}>+30%</span> amplifies the column lever</div>
            <div><span className="wb-matrix-cell is-sub" style={{ padding: '2px 6px', borderRadius: 3 }}>−30%</span> substitutes activity (avoids double-counting)</div>
            <div><span className="wb-matrix-cell is-med" style={{ padding: '2px 6px', borderRadius: 3 }}>+20%</span> mediates outcome shift</div>
          </div>
        </div>
      </div>

      <div className="wb-methods-grid is-twocol">
        <div className="wb-panel">
          <div className="wb-panel-head">
            <div className="wb-panel-title">Time-to-impact calendar<ProvChip kind="lit" /></div>
            <div className="wb-panel-meta">when each outcome category resolves</div>
          </div>
          <div className="wb-tti">
            {[
              { name: 'Engagement / participation', start: 0, end: 4 },

              { name: 'Navigation-driven screening', start: 2, end: 10 },

              const widthPct = ((row.end - row.start) / 20) * 100;
              const labelText = row.end === 20 ? `Q${row.start + 1}+` : `Q${row.start + 1}–Q${row.end}`;
              return (
                <div key={i} className="wb-tti-row">
                  <span className="wb-tti-name">{row.name}</span>
                  <div className="wb-tti-bar">

                      style={{ left: startPct + '%', width: widthPct + '%' }} />

                  </div>
                </div>
              );
            })}
            <div className="wb-tti-axis">
              <span></span>
              <div className="wb-tti-axis-grid">
                <span>Q1</span><span>Y2</span><span>Y3</span><span>Y4</span><span>Y5</span>
              </div>
            </div>
          </div>
          <div style={{ marginTop: 14, fontSize: 12, color: 'var(--slate-500)',
            lineHeight: 1.5 }}>
            Engagement-driven outcomes move in Year 1; behavioral outcomes by Year 2;
            chronic-disease incidence over Years 2–3; cancer outcomes from Year 3+.
            The model does not move all outcomes in Q1.
          </div>
        </div>

        <div className="wb-panel">
          <div className="wb-panel-head">
            <div className="wb-panel-title">What is not in this model<ProvChip kind="logic" /></div>
            <div className="wb-panel-meta">explicit exclusions</div>
          </div>
          <div className="wb-not-in-model">
            The following effects are not modeled in this version. Each is a deliberate
            scoping decision, not an oversight.
            <ul>
              <li><strong>Productivity spillovers</strong> beyond absenteeism and
                presenteeism (no team-level or supervisory propagation).</li>
              <li><strong>Recruiting and brand halo</strong> from a strong wellbeing
                program (real, but evidence base too weak to size).</li>
              <li><strong>Network effects</strong> beyond the uptake multipliers in
                the interaction matrix.</li>
              <li><strong>Climate / disaster risk</strong> exposure changes affecting
                regional workforce health.</li>
              <li><strong>Regional cost-of-living variation</strong> within the
                Southeast footprint (uniform unit costs applied).</li>
              <li><strong>Health-plan-design interactions</strong> — deductibles,
                copays, HSA/HDHP, network design, COE, surgical bundles, GLP-1
                utilization management. These belong in a separate Health Benefits
                Strategy model.</li>
              <li><strong>Manager capability and work design</strong> as a
                standalone lever (deferred to v2 — currently absorbed into uptake
                priors).</li>
            </ul>
          </div>
        </div>
      </div>

      <div className="wb-panel">
        <div className="wb-panel-head">
          <div className="wb-panel-title">Savings &amp; ROI basis<ProvChip kind="lit" /><ProvChip kind="logic" /></div>
          <div className="wb-panel-meta">how the dollar figures are derived and where they sit in the literature</div>
        </div>
        <div style={{ fontSize: 12.5, color: 'var(--color-text-secondary)', lineHeight: 1.6 }}>
          The headline figure is <strong>gross medical + Rx savings</strong>: the reduction
          in modeled per-employee-per-year spend versus the <strong>no-action</strong>
          trajectory, summed over four years across the workforce. Divided by wellbeing
          spend over the same period, the Recommended portfolio is tuned to
          ≈ <strong>$1.50 saved per $1</strong>; Max Activation deliberately lands lower
          (more spend, diminishing efficiency). NPV uses a 5% discount over five years.
          <div style={{ marginTop: 8 }}>
            That ratio sits toward the optimistic end of the published range, and is
            defensible only because the portfolio is weighted to higher-ROI clinical levers
            and modeled over a multi-year horizon:
          </div>
          <ul style={{ margin: '6px 0 0', paddingLeft: 18 }}>
            <li><strong>RAND (2013):</strong> ~1.5:1 overall — 3.8:1 for disease management vs 0.5:1 for lifestyle management.</li>
            <li><strong>Baicker et al. (2010):</strong> ~3.27:1 medical savings — widely cited but observational / selection-biased (upper bound).</li>
            <li><strong>Illinois Workplace Wellness RCT (2019):</strong> no significant medical-spend effect at 18 months — the skeptical lower bound; too short to capture chronic-disease savings.</li>
          </ul>
          <div style={{ marginTop: 8 }}>
            These are illustrative, literature-anchored priors — not a validated actuarial
            projection.
          </div>
        </div>
      </div>

      <div className="wb-panel">
        <div className="wb-panel-head">
          <div className="wb-panel-title">Sources &amp; calibration priors<ProvChip kind="lit" /></div>
          <div className="wb-panel-meta">
            informing the evidence-strength gradings and effect-size priors above
          </div>
        </div>
        <div className="wb-sources">
          {[
            ['Business Group on Health — 2026 Strategy Survey',
              'https://www.businessgrouphealth.org/resources/2026-employer-health-care-strategy-survey'],
            ['Business Group on Health — 2025 Well-being Strategy Survey',

const ASK_QUESTIONS = [
  {

  {
    q: 'Can we work from member-level medical + Rx claims, even a single plan year?',

  {

    sharpens: 'Replaces our blended per-lever spend rates, making the payback months and the $-saved-per-$1 ratio yours rather than literature-anchored.',

  {

/* ════════════════════════════════════════════════════════════════════
   APP
   ════════════════════════════════════════════════════════════════════ */

function App() {
  const [activeTab, setActiveTab] = useState('strategy');
  const [lens, setLens] = useState('cfo');
  const [subgroupDecomp, setSubgroupDecomp] = useState(false);
  const [leverValues, setLeverValues] = useState(SCENARIOS.recommended.values);
  const [deps, setDeps] = useState(DEFAULT_DEPENDENTS);

  // Derived state: which preset (if any) matches the current lever values,
  // and the computed outcome metrics. leverValues+deps drive everything;
  // changing either updates the metrics live.
  const activeScenario = useMemo(() => findActiveScenario(leverValues), [leverValues]);
  const metrics = useMemo(() => computeMetrics(leverValues, deps), [leverValues, deps]);

  const selectScenario = (id) => setLeverValues(SCENARIOS[id].values);

  return (
    <>
      <div className="wb-root">
        <Header />
        <TabBar active={activeTab} setActive={setActiveTab} />
        {activeTab === 'strategy' && (
          <main className="wb-main is-explorer">
            <ScenarioPicker activeScenario={activeScenario}
              onSelect={selectScenario}
              showLens={true} lens={lens} setLens={setLens} />
            <HeroCard lens={lens} metrics={metrics} leverValues={leverValues} deps={deps} />
            <PortfolioStrip metrics={metrics} leverValues={leverValues} deps={deps} />
            <div className="wb-explorer-grid">
              <div className="wb-explorer-col">
                <PortfolioTab values={leverValues} setValues={setLeverValues}
                  deps={deps} setDeps={setDeps} />
              </div>
              <div className="wb-explorer-col is-sticky">
                <OutcomesTab lens={lens} metrics={metrics}
                  leverValues={leverValues} deps={deps}
                  subgroupDecomp={subgroupDecomp}
                  setSubgroupDecomp={setSubgroupDecomp} />
              </div>
            </div>
          </main>
        )}
        {activeTab === 'workforce' && (
          <main className="wb-main">
            <WorkforceTab />
          </main>
        )}
        {activeTab === 'methods' && (
          <main className="wb-main">
            <MethodsTab />
          </main>
        )}
        {activeTab === 'ask' && (
          <main className="wb-main">
            <AskTab />
          </main>
        )}
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
