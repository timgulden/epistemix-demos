<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tonal adoption state machine</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #ffffff;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    svg {
      max-width: 100%;
      max-height: calc(100vh - 48px);
      width: auto;
      height: auto;
    }
  </style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 1080"
     font-family="Arial, Helvetica, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1c1c1c"/>
    </marker>
    <marker id="arrowred" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F04438"/>
    </marker>
    <marker id="arrowblue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4056F4"/>
    </marker>
  </defs>

  <text x="300" y="50" font-size="32" font-weight="bold" fill="#1c1c1c">Tonal adoption state machine</text>
  <text font-size="15" fill="#555555"><tspan x="300" y="78">Per-individual journey from Unaware through subscription, evangelism, and lapse.</tspan><tspan x="300" y="98">Transition probabilities are functions of persona, attributes, exposure, and social network.</tspan><tspan x="300" y="118">Small blue labels under each state name reference the Rogers Innovation-Decision stage.</tspan></text>

  <rect x="131" y="130" width="280" height="80" rx="40" ry="40" fill="#ffffff" stroke="#4056F4" stroke-width="2.5"/>
  <circle cx="169" cy="170" r="10" fill="#ffffff" stroke="#1c1c1c" stroke-width="1.8"/>
  <text x="271" y="177" text-anchor="middle" font-size="22" font-weight="bold" fill="#1c1c1c">Unaware</text>
  <text x="271" y="195" text-anchor="middle" font-size="12" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#4056F4">(pre-Knowledge)</text>

  <rect x="131" y="298" width="280" height="80" rx="40" ry="40" fill="#ffffff" stroke="#4056F4" stroke-width="2.5"/>
  <circle cx="169" cy="338" r="10" fill="#F1C40F" stroke="#7d6608" stroke-width="1.5"/>
  <text x="271" y="345" text-anchor="middle" font-size="22" font-weight="bold" fill="#1c1c1c">Aware</text>
  <text x="271" y="363" text-anchor="middle" font-size="12" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#4056F4">Knowledge</text>

  <rect x="131" y="466" width="280" height="80" rx="40" ry="40" fill="#ffffff" stroke="#4056F4" stroke-width="2.5"/>
  <circle cx="169" cy="506" r="10" fill="#B58DD9" stroke="#6E4BA8" stroke-width="1.5"/>
  <text x="271" y="513" text-anchor="middle" font-size="22" font-weight="bold" fill="#1c1c1c">Interested</text>
  <text x="271" y="531" text-anchor="middle" font-size="12" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#4056F4">Persuasion</text>

  <rect x="131" y="634" width="280" height="80" rx="40" ry="40" fill="#ffffff" stroke="#4056F4" stroke-width="2.5"/>
  <circle cx="169" cy="674" r="10" fill="#7F35C5" stroke="#4d1f78" stroke-width="1.5"/>
  <text x="271" y="681" text-anchor="middle" font-size="22" font-weight="bold" fill="#1c1c1c">Desire</text>
  <text x="271" y="699" text-anchor="middle" font-size="12" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#4056F4">Decision</text>

  <rect x="651" y="466" width="280" height="80" rx="40" ry="40" fill="#ffffff" stroke="#4056F4" stroke-width="2.5"/>
  <circle cx="689" cy="506" r="10" fill="#4056F4" stroke="#2536a3" stroke-width="1.5"/>
  <text x="791" y="513" text-anchor="middle" font-size="22" font-weight="bold" fill="#1c1c1c">Evangelist</text>
  <text x="791" y="531" text-anchor="middle" font-size="12" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#4056F4">Confirmation (+)</text>

  <rect x="651" y="634" width="280" height="80" rx="40" ry="40" fill="#ffffff" stroke="#4056F4" stroke-width="2.5"/>
  <circle cx="689" cy="674" r="10" fill="#229954" stroke="#1d6f3f" stroke-width="1.5"/>
  <text x="808" y="681" text-anchor="middle" font-size="22" font-weight="bold" fill="#1c1c1c">Active Subscriber</text>
  <text x="808" y="699" text-anchor="middle" font-size="12" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#4056F4">Implementation</text>

  <rect x="651" y="802" width="280" height="80" rx="40" ry="40" fill="#ffffff" stroke="#4056F4" stroke-width="2.5"/>
  <circle cx="689" cy="842" r="10" fill="#C84A3B" stroke="#7a2a22" stroke-width="1.5"/>
  <text x="791" y="849" text-anchor="middle" font-size="22" font-weight="bold" fill="#1c1c1c">At-Risk</text>
  <text x="791" y="867" text-anchor="middle" font-size="12" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#4056F4">(retention)</text>

  <rect x="651" y="970" width="280" height="80" rx="40" ry="40" fill="#ffffff" stroke="#737373" stroke-width="2.5" stroke-dasharray="8 4"/>
  <circle cx="689" cy="1010" r="10" fill="#ffffff" stroke="#C84A3B" stroke-width="1.8"/>
  <text x="791" y="1017" text-anchor="middle" font-size="22" font-weight="bold" fill="#1c1c1c">Lapsed</text>
  <text x="791" y="1035" text-anchor="middle" font-size="12" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#4056F4">Confirmation (−)</text>

  <path d="M 226 212 L 226 296" stroke="#1c1c1c" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text font-size="14" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#1c1c1c" text-anchor="end"><tspan x="211" y="236">ads</tspan><tspan x="211" y="254">press</tspan><tspan x="211" y="272">in-person exposure</tspan></text>
  <path d="M 316 296 L 316 212" stroke="#1c1c1c" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text font-size="14" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#555555"><tspan x="331" y="258">memory decay</tspan></text>

  <path d="M 226 380 L 226 464" stroke="#1c1c1c" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text font-size="14" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#1c1c1c" text-anchor="end"><tspan x="211" y="404">content</tspan><tspan x="211" y="422">reviews</tspan><tspan x="211" y="440">word-of-mouth</tspan></text>
  <path d="M 316 464 L 316 380" stroke="#1c1c1c" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text font-size="14" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#555555"><tspan x="331" y="413">time decay</tspan><tspan x="331" y="431">attention shift</tspan></text>

  <path d="M 226 548 L 226 632" stroke="#1c1c1c" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text font-size="14" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#1c1c1c" text-anchor="end"><tspan x="211" y="572">trial</tspan><tspan x="211" y="590">price</tspan><tspan x="211" y="608">social proof</tspan></text>
  <path d="M 316 632 L 316 548" stroke="#1c1c1c" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text font-size="14" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#555555"><tspan x="331" y="581">price doubt</tspan><tspan x="331" y="599">deferral</tspan></text>

  <path d="M 413 674 L 649 674" stroke="#4056F4" stroke-width="3" fill="none" marker-end="url(#arrowblue)"/>
  <text font-size="15" font-weight="bold" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#4056F4" text-anchor="middle"><tspan x="531" y="619">purchase trigger</tspan><tspan x="531" y="637">sale or promotion</tspan><tspan x="531" y="655">life transition</tspan></text>

  <path d="M 746 632 L 746 548" stroke="#1c1c1c" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text font-size="14" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#1c1c1c" text-anchor="end"><tspan x="731" y="572">milestones</tspan><tspan x="731" y="590">community</tspan><tspan x="731" y="608">referrals</tspan></text>
  <path d="M 836 548 L 836 632" stroke="#1c1c1c" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text font-size="14" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#555555"><tspan x="851" y="581">normalization</tspan><tspan x="851" y="599">novelty decline</tspan></text>

  <path d="M 746 716 L 746 800" stroke="#1c1c1c" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text font-size="14" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#1c1c1c" text-anchor="end"><tspan x="731" y="740">usage decline</tspan><tspan x="731" y="758">billing friction</tspan><tspan x="731" y="776">life event</tspan></text>
  <path d="M 836 800 L 836 716" stroke="#1c1c1c" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text font-size="14" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#555555"><tspan x="851" y="749">winback</tspan><tspan x="851" y="767">re-engagement</tspan></text>

  <path d="M 746 884 L 746 968" stroke="#F04438" stroke-width="1.8" fill="none" stroke-dasharray="7 4" marker-end="url(#arrowred)"/>
  <text font-size="14" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#C84A3B" text-anchor="end"><tspan x="731" y="917">billing lapse</tspan><tspan x="731" y="935">cancellation</tspan></text>

  <text x="60" y="1060" font-size="16" font-weight="bold" font-family="JetBrains Mono, Liberation Mono, Menlo, monospace" fill="#4056F4">EPISTEMIX</text>

</svg>
</body>
</html>
